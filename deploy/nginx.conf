# IslamQA MCP — example nginx (adjust paths/certs for your server)

# MCP endpoint (streamable-http, default port 8000)
server {
    listen 443 ssl http2;
    server_name islamqa-mcp.org www.islamqa-mcp.org;

    # ssl_certificate /etc/letsencrypt/live/islamqa-mcp.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/islamqa-mcp.org/privkey.pem;

    root /var/www/islamqa/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP streamable-http (adjust path if your FastMCP mount differs)
    location /mcp {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# Search frontend + API proxy
server {
    listen 443 ssl http2;
    server_name search.islamqa-mcp.org;

    root /var/www/islamqa/search;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Dedicated API subdomain (CORS from search + site)
server {
    listen 443 ssl http2;
    server_name api.islamqa-mcp.org;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
